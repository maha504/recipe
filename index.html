<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Recipe Finder</title>
    <style>
      /* --- Base Styles --- */
      body {
        font-family: "Poppins", "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #1e1e24 0%, #2a2a35 100%);
        color: #f5f5f7;
        margin: 0;
        padding: 40px 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }

      h1 {
        color: #ff9f43;
        font-size: 2.5rem;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 30px;
        text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
      }

      /* --- Form & Input Styles --- */
      form {
        display: flex;
        gap: 15px;
        margin-bottom: 40px;
        width: 100%;
        max-width: 550px;
        background: rgba(255, 255, 255, 0.05);
        padding: 10px;
        border-radius: 12px;
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.2);
        backdrop-filter: blur(4px);
        border: 1px solid rgba(255, 255, 255, 0.1);
      }

      input[type="text"] {
        flex: 1;
        padding: 14px 20px;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        background-color: #2c2c38;
        color: #fff;
        outline: none;
        transition: all 0.3s ease;
      }

      input[type="text"]:focus {
        background-color: #353545;
        box-shadow: 0 0 0 2px #ff9f43;
      }

      button {
        padding: 14px 30px;
        background: linear-gradient(45deg, #ff9f43, #ff6b6b);
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 16px;
        cursor: pointer;
        font-weight: bold;
        text-transform: uppercase;
        transition: transform 0.2s, box-shadow 0.2s;
        box-shadow: 0 4px 15px rgba(255, 159, 67, 0.4);
      }

      button:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(255, 159, 67, 0.6);
      }

      /* --- Flexbox Model for Meals --- */
      #meals {
        display: flex;
        flex-wrap: wrap;
        gap: 25px;
        justify-content: center;
        width: 100%;
        max-width: 1200px;
        margin-top: 20px;
      }

      /* --- Dish Card Styles --- */
      .dish-card {
        background: #25252e;
        border-radius: 15px;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        width: 280px;
        overflow: hidden;
        text-align: center;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        border: 1px solid rgba(255, 255, 255, 0.05);
      }

      .dish-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 15px 30px rgba(255, 159, 67, 0.2);
      }

      .dish-card img {
        width: 100%;
        height: 220px;
        object-fit: cover;
        border-bottom: 3px solid #ff9f43;
      }

      .dish-card h2 {
        font-size: 1.1rem;
        color: #ffffff;
        padding: 20px 15px;
        margin: 0;
        font-weight: 600;
        letter-spacing: 0.5px;
      }
      
      .status-msg {
        font-size: 1.2rem;
        color: #ee5253;
        font-weight: 500;
      }
    </style>
  </head>
  <body>
    <h1>✨ Digital Menu Card ✨</h1>

    <form onsubmit="getDishes(); return false;">
      <input
        type="text"
        name="dishname"
        id="dishname"
        placeholder="Search dishes (e.g., chicken, beef, cake)..."
      />
      <button>Search</button>
    </form>

    <div id="meals"></div>

    <script src="./index.js"></script>
  </body>
</html>
